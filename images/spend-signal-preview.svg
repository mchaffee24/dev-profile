<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Spend Signal dashboard preview</title>
  <desc id="desc">A dashboard mockup showing balance, income, spending alerts, category budgets, and weekly chart bars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8faf9"/>
      <stop offset="1" stop-color="#e6f2ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#202124" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <rect x="72" y="64" width="1056" height="632" rx="26" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="72" y="64" width="1056" height="92" rx="26" fill="#17191c"/>
  <rect x="72" y="128" width="1056" height="28" fill="#17191c"/>

  <text x="116" y="123" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Spend Signal</text>
  <text x="816" y="118" fill="#d5f2ea" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Budget Analyzer</text>

  <rect x="116" y="198" width="236" height="122" rx="14" fill="#f5f7f8" stroke="#d9dde3"/>
  <text x="140" y="238" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Balance</text>
  <text x="140" y="286" fill="#087f5b" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">$2,450</text>

  <rect x="382" y="198" width="236" height="122" rx="14" fill="#f5f7f8" stroke="#d9dde3"/>
  <text x="406" y="238" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Weekly Income</text>
  <text x="406" y="286" fill="#0b7285" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800">$620</text>

  <rect x="648" y="198" width="360" height="122" rx="14" fill="#fff8e7" stroke="#f7d47b"/>
  <circle cx="698" cy="259" r="28" fill="#f59f00"/>
  <text x="690" y="269" fill="#17191c" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">!</text>
  <text x="744" y="244" fill="#17191c" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Food is trending up</text>
  <text x="744" y="280" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="17">40% over last week</text>

  <rect x="116" y="370" width="424" height="240" rx="16" fill="#f5f7f8" stroke="#d9dde3"/>
  <text x="140" y="414" fill="#202124" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Category Targets</text>
  <rect x="140" y="452" width="344" height="18" rx="9" fill="#d9dde3"/>
  <rect x="140" y="452" width="210" height="18" rx="9" fill="#087f5b"/>
  <text x="140" y="500" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="18">Food</text>
  <text x="432" y="500" fill="#202124" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">18%</text>
  <rect x="140" y="526" width="344" height="18" rx="9" fill="#d9dde3"/>
  <rect x="140" y="526" width="164" height="18" rx="9" fill="#0b7285"/>
  <text x="140" y="574" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="18">Gas</text>
  <text x="442" y="574" fill="#202124" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">12%</text>

  <rect x="590" y="370" width="418" height="240" rx="16" fill="#f5f7f8" stroke="#d9dde3"/>
  <text x="614" y="414" fill="#202124" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Weekly Spending</text>
  <line x1="632" y1="558" x2="966" y2="558" stroke="#c6cbd1" stroke-width="2"/>
  <rect x="654" y="500" width="34" height="58" rx="7" fill="#0b7285"/>
  <rect x="716" y="462" width="34" height="96" rx="7" fill="#087f5b"/>
  <rect x="778" y="482" width="34" height="76" rx="7" fill="#0b7285"/>
  <rect x="840" y="428" width="34" height="130" rx="7" fill="#f59f00"/>
  <rect x="902" y="455" width="34" height="103" rx="7" fill="#087f5b"/>
  <text x="654" y="584" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="14">Mon</text>
  <text x="714" y="584" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="14">Tue</text>
  <text x="778" y="584" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="14">Wed</text>
  <text x="840" y="584" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="14">Thu</text>
  <text x="902" y="584" fill="#5f6368" font-family="Inter, Arial, sans-serif" font-size="14">Fri</text>
</svg>
